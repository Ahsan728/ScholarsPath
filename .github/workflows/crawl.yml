name: Daily Scholarship Crawl

on:
  schedule:
    # Run every day at 06:00 UTC (12:00 BD time)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Specific crawler to run (leave empty for all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (extract only, do not save)"
        type: boolean
        default: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: crawlers/requirements.txt

      - name: Install Python dependencies
        run: |
          cd crawlers
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PINECONE_API_KEY:          ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME:       ${{ secrets.PINECONE_INDEX_NAME }}
          HUGGINGFACE_API_TOKEN:     ${{ secrets.HUGGINGFACE_API_TOKEN }}
        run: |
          cd crawlers
          SOURCE="${{ github.event.inputs.source }}"
          DRY="${{ github.event.inputs.dry_run }}"
          ARGS=""
          [ -n "$SOURCE" ] && ARGS="$ARGS --source $SOURCE"
          [ "$DRY" = "true" ] && ARGS="$ARGS --dry-run"
          python pipeline.py $ARGS

      - name: Trigger deadline alerts
        if: github.event_name == 'schedule'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL:    ${{ secrets.SITE_URL }}
        run: |
          curl -sf "${SITE_URL}/api/alerts?secret=${CRON_SECRET}" \
            || echo "Alert trigger failed (non-fatal)"
